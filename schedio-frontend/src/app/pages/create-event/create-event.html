<h2 class = "pageHeader" i18n="@@NewEvent">
  Nuevo Evento
</h2>

<form class="form-grid">
  <label class="section-label" i18n="@@NewEventTitle">Título del evento</label>

  <label class="section-label second-column" i18n="@@EventDate">Fecha del evento</label>

  <app-input-field
    [(ngModel)]="title"
    name="title"
    placeholder='Colócale un nombre a tu evento'
    i18n-placeholder="@@NewEventTitlePlaceholder">
  </app-input-field>

  <app-date-field
    [(ngModel)]="date"
    name="date"
  ></app-date-field>

  <label class="section-label" i18n="@@NewEventDesc">Descripción (Opcional)</label>

  <label class="section-label second-column" i18n="@@EventTime">Hora de inicio</label>

  <app-input-textarea
    [(ngModel)]="description"
    name="description"
    placeholder='Describe tu evento en pocas palabras'
    i18n-placeholder="@@NewAssignmentDescPlaceholder">
  </app-input-textarea>

  <app-input-field
    [(ngModel)]="hour"
    name="hour"
    placeholder='Hora'
    i18n-placeholder="@@HourPlaceholder">
  </app-input-field>
  <app-input-field
    [(ngModel)]="minute"
    name="minute"
    placeholder='Min'
    i18n-placeholder="@@MinutePlaceholder">
  </app-input-field>
  <select class="custom-select">
    <option value="" disabled selected hidden>AM/PM</option>
    <option value="AM">AM</option>
    <option value="PM">PM</option>
  </select>

  <label class="section-label" i18n="@@Category">Categoria</label>

  <select class="custom-select second-column">
    <option value="" disabled selected i18n>Selecciona una categoría</option>
  </select>

</form>
<app-button-box (cancelClicked)="onCancel()" (saveClicked)="onSave()"></app-button-box>
