<div class="date-container">
  @if (label) {
    <label class="date-label">
      {{ label }}
      <span [class.visible]="required" class="missingField">*</span>
    </label>
  }
  <input class="input-field" type="date"
   [value]="value"
   (input)="onInput($event)"
   (blur)="onTouched()">
</div>
