<article class="task-card" [class.state-completed]="state === 'completed'" [class.state-overdue]="state === 'overdue'"
  [class.state-imminent]="state === 'imminent'" [class.state-soon]="state === 'soon'"
  [class.state-upcoming]="state === 'upcoming'">
  <div class="task-card-bar" aria-hidden="true"></div>

  <div class="task-card-body">
    <div class="task-card-header">
      <p class="task-date">{{ formattedDate }}</p>
      <h3 class="task-title"(click)="navigateToEdit($event)" 
          style="cursor: pointer;">
        {{ title }}
      </h3>
      @if (displayedTime) {
      <p class="task-time">
        <span class="task-time-icon" aria-hidden="true"></span>
        {{ displayedTime }}
      </p>
      }
    </div>

    <div class="task-card-meta">
      <span class="task-badge">{{ stateLabel }}</span>
      <app-card-checkbox
        [checked]="completed"
        [overdue]="state === 'overdue'"
        (toggle)="toggleComplete.emit()"
      />
    </div>
  </div>
</article>
