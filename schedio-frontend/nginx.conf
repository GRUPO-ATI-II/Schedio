map $http_accept_language $lang {
    default en;
    ~es es;
    ~fr fr;
}

server {
    listen 80;
    # Aceptar peticiones por IP, localhost o nombre de servicio (frontend) desde otros contenedores
    server_name localhost frontend _;

    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Proxy API al backend (necesario en Docker/QA para E2E y registro/login)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Por si la app hace peticiones con prefijo de idioma (ej. /es/api/...)
    location ~ ^/(en|es|fr|it|pt)/api/(.*)$ {
        proxy_pass http://backend:3000/api/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        return 301 /en/;
    }

    location ~ ^/(en|es|fr|it|pt)/ {
        try_files $uri $uri/ /$1/index.html;
    }

    location / {
        rewrite ^/(.*)$ /en/$1 permanent;
    }
}
