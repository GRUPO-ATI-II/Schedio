services:
  mongo:
    image: mongo:latest
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    command: node index.js
    environment:
      - NODE_ENV=qa
      - PORT=3000
      - DB_NAME=schedio_qa
      - MONGO_URI=mongodb://mongo:27017/schedio_qa
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./schedio-frontend
      target: server
    ports:
      - "4100:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
