services:
  mongo:
    image: mongo:latest
    networks: [e2e]

  backend:
    build:
      context: ./backend
      target: production
    command: node index.js
    environment:
      - NODE_ENV=qa
      - PORT=3000
      - DB_NAME=schedio_qa
      - MONGO_URI=mongodb://mongo:27017/schedio_qa
    depends_on:
      - mongo
    networks: [e2e]

  frontend:
    build:
      context: ./schedio-frontend
      target: server
    ports:
      - "4100:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks: [e2e]

# Red con nombre fijo para que el contenedor E2E (Cypress) pueda alcanzar frontend y backend por nombre
networks:
  e2e:
    name: schedio-main-pipeline_default
