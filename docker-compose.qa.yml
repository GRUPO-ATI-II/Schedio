services:
  mongo:
    image: mongo:latest

  backend:
    build:
      context: ./backend
      target: production
    command: npm run start:qa
    environment:
      - NODE_ENV=qa
      - PORT=3000
      - DB_NAME=schedio_qa
      - MONGO_URI=mongodb://mongo-qa:27017/schedio_qa
    depends_on:
      - mongo-qa

  frontend:
    build:
      context: ./schedio-frontend
      target: server
    ports:
      - "4100:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
