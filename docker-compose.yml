services:
  mongo:
    image: mongo:latest
    container_name: schedio-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      target: development
    container_name: schedio-backend
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/schedio_dev
      - CHOKIDAR_USEPOLLING=true

  frontend:
    build:
      context: ./schedio-frontend
      target: development
    container_name: schedio-frontend
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --poll 2000"
    ports:
      - "4200:4200"
    volumes:
      - ./schedio-frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mongo-data:
